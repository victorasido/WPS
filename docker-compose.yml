services:
  bot:
    build: .
    container_name: wordsigner_bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - DATA_DIR=/app/data
    ports:
      - "8443:8443"   # Webhook port — aktif hanya jika USE_WEBHOOK=true
    deploy:
      resources:
        limits:
          memory: 1g    # Bot tidak bisa memakai lebih dari 1GB RAM
          cpus: "1.5"   # Maksimal 1.5 CPU core
        reservations:
          memory: 256m  # Jaminan minimum RAM agar tidak di-swap

